set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g default-shell /usr/bin/zsh

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10


################################## --- ~~ TPM Plugins ~~ --- ##########################################
# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
# set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @plugin 'Nybkox/tmux-ukiyo'
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'
set -g status-style bg=default

#set -g mode-style "fg=#1f1f28,bg=#7aa89f"
#set -g message-style "fg=#1f1f28,bg=#7aa89f"
#set -g pane-border-style "fg=#54546d"
#set -g pane-active-border-style "fg=#7e9cd8"
#set -g status-style "fg=#dcd7ba,bg=#1f1f28"
##set -g window-status-style "fg=#54546d,bg=#1f1f28"
##set -g window-status-current-style "fg=#7e9cd8,bg=#1f1f28"
###

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)

if "test ! -d $HOME/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $HOME/.tmux/plugins/tpm && $HOME/.tmux/plugins/tpm/bin/install_plugins'"

# If plugins are missing, run prefix + I (Ctrl-a I) to install them

run-shell '$HOME/.tmux/plugins/tpm/tpm'
